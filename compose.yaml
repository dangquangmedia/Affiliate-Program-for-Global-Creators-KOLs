name: affiliate-global

services:
  postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AFFILIATE_DB_NAME:-affiliate_global}
      POSTGRES_USER: ${AFFILIATE_DB_USER:-affiliate_app}
      POSTGRES_PASSWORD: ${AFFILIATE_DB_PASSWORD:?Set AFFILIATE_DB_PASSWORD in local environment}
    ports:
      - "${AFFILIATE_DB_PORT:-5433}:5432"
    volumes:
      - affiliate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - affiliate_private

volumes:
  affiliate_postgres_data:

networks:
  affiliate_private:
    driver: bridge

